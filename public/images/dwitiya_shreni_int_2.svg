<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background -->
  <rect width="400" height="400" fill="#f0e6d2"/>
  
  <!-- Category badge -->
  <rect x="20" y="20" width="120" height="35" rx="5" fill="#b45309"/>
  <text x="80" y="42" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">द्वितीय श्रेणी</text>
  
  <!-- Brick 1 - urban -->
  <rect x="50" y="80" width="120" height="80" fill="#a14d25" stroke="#6b2f17" stroke-width="2"/>
  <path d="M 50 95 L 170 95" stroke="#c67a4e" stroke-width="1"/>
  <path d="M 50 130 L 170 130" stroke="#c67a4e" stroke-width="1"/>
  <ellipse cx="80" cy="105" rx="3" ry="2" fill="#8b3e1f" opacity="0.5"/>
  <ellipse cx="145" cy="120" rx="4" ry="3" fill="#8b3e1f" opacity="0.5"/>
  
  <!-- Brick 2 -->
  <rect x="180" y="80" width="120" height="80" fill="#8d3f1f" stroke="#6b2f17" stroke-width="2"/>
  <path d="M 180 95 L 300 95" stroke="#c67a4e" stroke-width="1"/>
  <path d="M 180 130 L 300 130" stroke="#c67a4e" stroke-width="1"/>
  
  <!-- Brick 3 -->
  <rect x="310" y="80" width="40" height="80" fill="#a14d25" stroke="#6b2f17" stroke-width="2"/>
  
  <!-- Brick 4 -->
  <rect x="50" y="170" width="120" height="80" fill="#8d3f1f" stroke="#6b2f17" stroke-width="2"/>
  <path d="M 50 185 L 170 185" stroke="#c67a4e" stroke-width="1"/>
  <path d="M 50 220 L 170 220" stroke="#c67a4e" stroke-width="1"/>
  <ellipse cx="100" cy="195" rx="3" ry="2" fill="#8b3e1f" opacity="0.5"/>
  
  <!-- Brick 5 -->
  <rect x="180" y="170" width="120" height="80" fill="#a14d25" stroke="#6b2f17" stroke-width="2"/>
  <path d="M 180 185 L 300 185" stroke="#c67a4e" stroke-width="1"/>
  <path d="M 180 220 L 300 220" stroke="#c67a4e" stroke-width="1"/>
  
  <!-- Building icon -->
  <g transform="translate(340, 200)">
    <rect x="-8" y="-8" width="16" height="16" fill="#0891b2" stroke="#0e7490" stroke-width="1"/>
    <rect x="-6" y="-6" width="3" height="3" fill="#e0f2fe"/>
    <rect x="-1" y="-6" width="3" height="3" fill="#e0f2fe"/>
    <rect x="3" y="-6" width="3" height="3" fill="#e0f2fe"/>
    <rect x="-6" y="-1" width="3" height="3" fill="#e0f2fe"/>
    <rect x="3" y="-1" width="3" height="3" fill="#e0f2fe"/>
  </g>
  
  <!-- Text info -->
  <text x="200" y="290" font-family="Arial" font-size="18" font-weight="bold" fill="#3f3f3f" text-anchor="middle">शहरी निर्माण</text>
  <text x="200" y="320" font-family="Arial" font-size="14" fill="#666" text-anchor="middle">अच्छी कार्यकारी गुणवत्ता</text>
  <text x="200" y="350" font-family="Arial" font-size="16" font-weight="bold" fill="#b45309" text-anchor="middle">₹1300</text>
</svg>