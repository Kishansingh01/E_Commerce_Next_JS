<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background -->
  <rect width="400" height="400" fill="#f0e6d2"/>
  
  <!-- Category badge -->
  <rect x="20" y="20" width="120" height="35" rx="5" fill="#713f12"/>
  <text x="80" y="42" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">चतुर्थ श्रेणी</text>
  
  <!-- Brick 1 - over-baked -->
  <rect x="50" y="80" width="120" height="80" fill="#5a3a1f" stroke="#3f2817" stroke-width="2"/>
  <path d="M 50 95 L 170 95" stroke="#7a5c3f" stroke-width="1"/>
  <path d="M 50 130 L 170 130" stroke="#7a5c3f" stroke-width="1"/>
  <circle cx="75" cy="105" r="2" fill="#3f2817"/>
  <ellipse cx="130" cy="115" rx="5" ry="4" fill="#3f2817" opacity="0.7"/>
  <ellipse cx="155" cy="135" rx="4" ry="3" fill="#3f2817" opacity="0.7"/>
  <path d="M 90 100 L 95 110" stroke="#3f2817" stroke-width="1" opacity="0.5"/>
  
  <!-- Brick 2 -->
  <rect x="180" y="80" width="120" height="80" fill="#5a3a1f" stroke="#3f2817" stroke-width="2"/>
  <path d="M 180 95 L 300 95" stroke="#7a5c3f" stroke-width="1"/>
  <path d="M 180 130 L 300 130" stroke="#7a5c3f" stroke-width="1"/>
  <circle cx="205" cy="110" r="2.5" fill="#3f2817"/>
  <ellipse cx="260" cy="120" rx="5" ry="4" fill="#3f2817" opacity="0.7"/>
  
  <!-- Brick 3 -->
  <rect x="310" y="80" width="40" height="80" fill="#5a3a1f" stroke="#3f2817" stroke-width="2"/>
  <ellipse cx="325" cy="108" rx="4" ry="3" fill="#3f2817" opacity="0.7"/>
  
  <!-- Brick 4 -->
  <rect x="50" y="170" width="120" height="80" fill="#5a3a1f" stroke="#3f2817" stroke-width="2"/>
  <path d="M 50 185 L 170 185" stroke="#7a5c3f" stroke-width="1"/>
  <path d="M 50 220 L 170 220" stroke="#7a5c3f" stroke-width="1"/>
  <circle cx="85" cy="200" r="2" fill="#3f2817"/>
  <ellipse cx="140" cy="215" rx="4" ry="3" fill="#3f2817" opacity="0.7"/>
  
  <!-- Brick 5 -->
  <rect x="180" y="170" width="120" height="80" fill="#5a3a1f" stroke="#3f2817" stroke-width="2"/>
  <path d="M 180 185 L 300 185" stroke="#7a5c3f" stroke-width="1"/>
  <path d="M 180 220 L 300 220" stroke="#7a5c3f" stroke-width="1"/>
  <ellipse cx="210" cy="205" rx="4" ry="3" fill="#3f2817" opacity="0.7"/>
  
  <!-- Rubble/Fill icon -->
  <g transform="translate(340, 200)">
    <circle cx="0" cy="0" r="12" fill="#ef4444" stroke="#dc2626" stroke-width="1"/>
    <path d="M-6,-4 L6,4 M-6,4 L6,-4" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Text info -->
  <text x="200" y="290" font-family="Arial" font-size="18" font-weight="bold" fill="#3f3f3f" text-anchor="middle">भराई के लिए</text>
  <text x="200" y="320" font-family="Arial" font-size="14" fill="#666" text-anchor="middle">सहायक कार्य, बहुउद्देश्यीय</text>
  <text x="200" y="350" font-family="Arial" font-size="16" font-weight="bold" fill="#713f12" text-anchor="middle">₹500</text>
</svg>