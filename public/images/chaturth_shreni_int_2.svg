<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background -->
  <rect width="400" height="400" fill="#f0e6d2"/>
  
  <!-- Category badge -->
  <rect x="20" y="20" width="120" height="35" rx="5" fill="#713f12"/>
  <text x="80" y="42" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">चतुर्थ श्रेणी</text>
  
  <!-- Brick 1 - multi-purpose -->
  <rect x="50" y="80" width="120" height="80" fill="#5a3a1f" stroke="#3f2817" stroke-width="2"/>
  <path d="M 50 95 L 170 95" stroke="#7a5c3f" stroke-width="1"/>
  <path d="M 50 130 L 170 130" stroke="#7a5c3f" stroke-width="1"/>
  <circle cx="72" cy="100" r="2" fill="#3f2817"/>
  <ellipse cx="135" cy="118" rx="5" ry="4" fill="#3f2817" opacity="0.7"/>
  <circle cx="155" cy="138" r="2.5" fill="#3f2817"/>
  <path d="M 85 105 L 90 115" stroke="#3f2817" stroke-width="0.5" opacity="0.5"/>
  
  <!-- Brick 2 -->
  <rect x="180" y="80" width="120" height="80" fill="#5a3a1f" stroke="#3f2817" stroke-width="2"/>
  <path d="M 180 95 L 300 95" stroke="#7a5c3f" stroke-width="1"/>
  <path d="M 180 130 L 300 130" stroke="#7a5c3f" stroke-width="1"/>
  <circle cx="210" cy="108" r="2" fill="#3f2817"/>
  <ellipse cx="265" cy="125" rx="5" ry="4" fill="#3f2817" opacity="0.7"/>
  
  <!-- Brick 3 -->
  <rect x="310" y="80" width="40" height="80" fill="#5a3a1f" stroke="#3f2817" stroke-width="2"/>
  <circle cx="328" cy="110" r="2" fill="#3f2817"/>
  
  <!-- Brick 4 -->
  <rect x="50" y="170" width="120" height="80" fill="#5a3a1f" stroke="#3f2817" stroke-width="2"/>
  <path d="M 50 185 L 170 185" stroke="#7a5c3f" stroke-width="1"/>
  <path d="M 50 220 L 170 220" stroke="#7a5c3f" stroke-width="1"/>
  <circle cx="90" cy="195" r="2" fill="#3f2817"/>
  <ellipse cx="145" cy="210" rx="4" ry="3" fill="#3f2817" opacity="0.7"/>
  
  <!-- Brick 5 -->
  <rect x="180" y="170" width="120" height="80" fill="#5a3a1f" stroke="#3f2817" stroke-width="2"/>
  <path d="M 180 185 L 300 185" stroke="#7a5c3f" stroke-width="1"/>
  <path d="M 180 220 L 300 220" stroke="#7a5c3f" stroke-width="1"/>
  <circle cx="215" cy="200" r="2.5" fill="#3f2817"/>
  <ellipse cx="260" cy="220" rx="4" ry="3" fill="#3f2817" opacity="0.7"/>
  
  <!-- Multi-purpose checkmark -->
  <g transform="translate(340, 200)">
    <rect x="-10" y="-10" width="20" height="20" fill="#06b6d4" stroke="#0891b2" stroke-width="1" rx="2"/>
    <path d="M-4,-1 L0,3 L5,-4" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Text info -->
  <text x="200" y="290" font-family="Arial" font-size="18" font-weight="bold" fill="#3f3f3f" text-anchor="middle">बहुउद्देश्यीय</text>
  <text x="200" y="320" font-family="Arial" font-size="14" fill="#666" text-anchor="middle">सर्वाधिक किफायती विकल्प</text>
  <text x="200" y="350" font-family="Arial" font-size="16" font-weight="bold" fill="#713f12" text-anchor="middle">₹600</text>
</svg>