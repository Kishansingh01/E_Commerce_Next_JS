<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background -->
  <rect width="400" height="400" fill="#f0e6d2"/>
  
  <!-- Category badge -->
  <rect x="20" y="20" width="120" height="35" rx="5" fill="#d97706"/>
  <text x="80" y="42" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">प्रथम श्रेणी</text>
  
  <!-- Brick 1 - Premium -->
  <rect x="50" y="80" width="120" height="80" fill="#c45d3f" stroke="#8b3e1f" stroke-width="2"/>
  <path d="M 50 95 L 170 95" stroke="#e8a897" stroke-width="1"/>
  <path d="M 50 130 L 170 130" stroke="#e8a897" stroke-width="1"/>
  <rect x="60" y="90" width="100" height="60" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.6"/>
  
  <!-- Brick 2 -->
  <rect x="180" y="80" width="120" height="80" fill="#d96f4b" stroke="#8b3e1f" stroke-width="2"/>
  <path d="M 180 95 L 300 95" stroke="#e8a897" stroke-width="1"/>
  <path d="M 180 130 L 300 130" stroke="#e8a897" stroke-width="1"/>
  
  <!-- Brick 3 -->
  <rect x="310" y="80" width="40" height="80" fill="#c45d3f" stroke="#8b3e1f" stroke-width="2"/>
  
  <!-- Brick 4 -->
  <rect x="50" y="170" width="120" height="80" fill="#d96f4b" stroke="#8b3e1f" stroke-width="2"/>
  <path d="M 50 185 L 170 185" stroke="#e8a897" stroke-width="1"/>
  <path d="M 50 220 L 170 220" stroke="#e8a897" stroke-width="1"/>
  
  <!-- Brick 5 -->
  <rect x="180" y="170" width="120" height="80" fill="#c45d3f" stroke="#8b3e1f" stroke-width="2"/>
  <path d="M 180 185 L 300 185" stroke="#e8a897" stroke-width="1"/>
  <path d="M 180 220 L 300 220" stroke="#e8a897" stroke-width="1"/>
  
  <!-- Premium crown -->
  <g transform="translate(340, 190)">
    <path d="M-8,8 L-5,0 L0,-8 L5,0 L8,8 Z" fill="#fbbf24" stroke="#f59e0b" stroke-width="1"/>
    <circle cx="-8" cy="0" r="2" fill="#fbbf24"/>
    <circle cx="0" cy="-6" r="2" fill="#fbbf24"/>
    <circle cx="8" cy="0" r="2" fill="#fbbf24"/>
  </g>
  
  <!-- Text info -->
  <text x="200" y="290" font-family="Arial" font-size="18" font-weight="bold" fill="#3f3f3f" text-anchor="middle">प्रीमियम गुणवत्ता</text>
  <text x="200" y="320" font-family="Arial" font-size="14" fill="#666" text-anchor="middle">सूक्ष्म बनावट, दृश्यमान दीवारें</text>
  <text x="200" y="350" font-family="Arial" font-size="16" font-weight="bold" fill="#d97706" text-anchor="middle">₹1800</text>
</svg>